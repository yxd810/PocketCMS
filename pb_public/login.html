<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>登录 - PocketCMS</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/fontawesome/css/all.css">
    <script src="/js/site-config.js"></script>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-cube"></i>
                <h1 id="siteName">PocketCMS</h1>
                <p>登录您的账号</p>
            </div>
            
            <!-- 验证提示信息 -->
            <div id="verifyMsg" style="display: none; padding: 0.75rem; margin-bottom: 1rem; background: #dbeafe; border-radius: 8px; color: #1e40af; text-align: center;">
                <i class="fas fa-envelope"></i> 注册成功！请查收验证邮件完成验证后登录。
            </div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> 邮箱</label>
                    <input type="text" id="identity" required placeholder="邮箱">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> 密码</label>
                    <input type="password" id="password" required placeholder="密码">
                </div>
                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-sign-in-alt"></i> 登录
                </button>
            </form>
            
            <div class="auth-footer">
                <div id="registerLinkContainer">
                    还没有账号？<a href="/register.html" id="registerLink">立即注册</a>
                </div>
                <div id="registerDisabledMsg" style="display: none; margin-top: 10px;">
                    <i class="fas fa-ban"></i> 注册功能已关闭
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/pocketbase@0.21.5/dist/pocketbase.umd.js"></script>
    <script src="/js/config.js"></script>
    <script src="/js/nav.js"></script>
    <script>
        // 检查 URL 参数，显示验证提示
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('msg') === 'verify') {
            document.getElementById('verifyMsg').style.display = 'block';
        }


        // 检查是否已登录
        if (pb.authStore.isValid) {
            window.location.href = '/';
        }
        
        // 检查是否允许注册
        function checkRegistrationAllowed() {
            const allowRegistration = localStorage.getItem('allowRegistration') !== 'false';
            const registerLink = document.getElementById('registerLink');
            const disabledMsg = document.getElementById('registerDisabledMsg');
            if (!allowRegistration) {
                if (registerLink) {
                    registerLink.style.pointerEvents = 'none';
                    registerLink.style.opacity = '0.5';
                    registerLink.style.cursor = 'not-allowed';
                }
                if (disabledMsg) disabledMsg.style.display = 'block';
            }
        }
        
        // 应用站点名称
        const siteName = localStorage.getItem('siteName') || 'PocketCMS';
        document.getElementById('siteName').textContent = siteName;
        document.title = '登录 - ' + siteName;
        
        // 检查注册状态
        checkRegistrationAllowed();
        
        // 登录表单处理
        const form = document.getElementById('loginForm');
        const identityInput = document.getElementById('identity');
        const passwordInput = document.getElementById('password');
        
        // 发送验证邮件函数(新增)
        async function sendVerificationEmail(email) {
            try {
                await pb.collection('users').requestVerification(email);
                showNotification('验证邮件已重新发送，请查收邮箱', 'success');
            } catch (error) {
                showNotification('发送失败：' + error.message, 'error');
            }
        }


        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const identity = identityInput.value.trim();
            const password = passwordInput.value;
            
            if (!identity || !password) {
                showNotification('请填写邮箱/用户名和密码', 'error');
                return;
            }
            
            const submitBtn = form.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 登录中...';
            submitBtn.disabled = true;
            
            try {
                const authData = await pb.collection('users').authWithPassword(identity, password);
                
                // 检查邮箱是否已验证(新增部分)
                if (!authData.record.verified) {
                    pb.authStore.clear();
                    
                    // 询问是否重新发送验证邮件
                    const resend = confirm('邮箱未验证！是否重新发送验证邮件？');
                    if (resend) {
                        await sendVerificationEmail(identity);
                    }
                    return;
                }
                
                console.log('登录成功:', authData);
                showNotification('登录成功！正在跳转...', 'success');
                setTimeout(() => {
                    window.location.href = '/index.html';
                }, 1000);
            } catch (error) {
                console.error('登录失败:', error);
                let errorMsg = '登录失败：';
                if (error.message) {
                    errorMsg += error.message;
                } else {
                    errorMsg += '请检查邮箱和密码';
                }
                showNotification(errorMsg, 'error');
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
