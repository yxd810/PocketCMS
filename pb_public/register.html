<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>注册 - PocketCMS</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/fontawesome/css/all.css">
    <script src="/js/site-config.js"></script>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-cube"></i>
                <h1 id="siteName">PocketCMS</h1>
                <p>创建新账号</p>
            </div>
            
            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> 邮箱</label>
                    <input type="email" id="email" required placeholder="请输入邮箱">
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-user"></i> 昵称</label>
                    <input type="text" id="name" placeholder="请输入昵称（可选）">
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> 密码</label>
                    <input type="password" id="password" required placeholder="请输入密码（至少8位）">
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-check-circle"></i> 确认密码</label>
                    <input type="password" id="passwordConfirm" required placeholder="请再次输入密码">
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-user-plus"></i> 注册
                </button>
            </form>
            
            <div class="auth-footer">
                已有账号？<a href="/login.html">立即登录</a>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/pocketbase@0.21.5/dist/pocketbase.umd.js"></script>
    <script src="/js/config.js"></script>
    <script src="/js/nav.js"></script>
    <script>
        // 应用站点名称
        const siteName = localStorage.getItem('siteName') || 'PocketCMS';
        document.getElementById('siteName').textContent = siteName;
        document.title = siteName + '注册 - ';
        
        // 检查是否允许注册
        function isRegistrationAllowed() {
            const allowRegistration = localStorage.getItem('allowRegistration') !== 'false';
            return allowRegistration;
        }
        
        // 如果注册已关闭，直接跳转
        if (!isRegistrationAllowed()) {
            alert('注册功能已关闭，无法注册新账号');
            window.location.href = '/login.html';
        }
        
        // 检查是否已登录
        if (pb.authStore.isValid) {
            window.location.href = '/index.html';
        }
        
        const form = document.getElementById('registerForm');
        
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // 再次检查注册是否允许
            if (!isRegistrationAllowed()) {
                showNotification('注册功能已关闭', 'error');
                setTimeout(() => window.location.href = '/login.html', 1500);
                return;
            }
            
            const email = document.getElementById('email').value.trim();
            const name = document.getElementById('name').value.trim();
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('passwordConfirm').value;
            
            if (!email || !password) {
                showNotification('请填写邮箱和密码', 'error');
                return;
            }
            
            if (password !== passwordConfirm) {
                showNotification('两次输入的密码不一致', 'error');
                return;
            }
            
            if (password.length < 8) {
                showNotification('密码长度至少为8位', 'error');
                return;
            }
            
            const submitBtn = form.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 注册中...';
            submitBtn.disabled = true;
            
            try {
                // 1. 创建用户
                const userData = await pb.collection('users').create({
                    email: email,
                    name: name || email.split('@')[0],
                    password: password,
                    passwordConfirm: passwordConfirm,
                    emailVisibility: true
                });
                
                console.log('注册成功:', userData);

                // 2. 发送验证邮件
                await pb.collection('users').requestVerification(email);

                showNotification('注册成功！验证邮件已发送，请查收邮箱完成验证', 'success');
                
                 // 3. 跳转到首页 
                //await pb.collection('users').authWithPassword(email, password);
                //setTimeout(() => {
                //    window.location.href = '/index.html';
                //}, 1500);

                // 3. 跳转到登录页   (修改为验证提示页)
                setTimeout(() => {
                    window.location.href = '/login.html?msg=verify';
                }, 3000);
            } catch (error) {
                console.error('注册失败:', error);
                let errorMsg = '注册失败：';
                if (error.data) {
                    const errors = [];
                    if (error.data.email) errors.push(error.data.email.message);
                    if (error.data.password) errors.push(error.data.password.message);
                    errorMsg += errors.join(', ') || '请检查输入信息';
                } else if (error.message) {
                    errorMsg += error.message;
                }
                showNotification(errorMsg, 'error');
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
